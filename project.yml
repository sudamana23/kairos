name: Kairos
options:
  bundleIdPrefix: com.kairos
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

targets:
  Kairos:
    type: application
    platform: macOS
    sources:
      - path: Kairos
        excludes:
          - Resources/Assets.xcassets
    resources:
      - path: Kairos/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kairos.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Kairos/Resources/Kairos.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: targeted
    info:
      path: Kairos/Resources/Info.plist
      properties:
        CFBundleName: Kairos
        CFBundleDisplayName: Kairos
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHealthShareUsageDescription: "Kairos reads your health data to surface physiological context during life reviews."
        NSMicrophoneUsageDescription: "Kairos uses the microphone for voice pulse check-ins and monthly review recordings."
