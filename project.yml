name: Kairos
options:
  bundleIdPrefix: com.damianspendel
  createIntermediateGroups: true

schemes:
  FourOneEight:
    build:
      targets:
        Kairos: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Kairos:
    type: application
    supportedDestinations:
      - macOS
      - iOS
    deploymentTargets:
      macOS: "14.0"
      iOS: "17.0"
    sources:
      - path: Kairos
    dependencies:
      - sdk: CloudKit.framework
      - sdk: HealthKit.framework
        platforms: [iOS]
      - sdk: Security.framework
      - sdk: Speech.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_NAME: FourOneEight
        PRODUCT_BUNDLE_IDENTIFIER: com.damianspendel.kairos
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "2"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 5Y9SADJQM9
        CODE_SIGN_ENTITLEMENTS: Kairos/Resources/Kairos.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ARCHS: "$(ARCHS_STANDARD)"
        ONLY_ACTIVE_ARCH: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: targeted
    info:
      path: Kairos/Resources/Info.plist
      properties:
        CFBundleName: FourOneEight
        CFBundleDisplayName: FourOneEight
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHighResolutionCapable: true
        ITSAppUsesNonExemptEncryption: false
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHealthShareUsageDescription: "FourOneEight reads your health data to surface physiological context during life reviews."
        NSMicrophoneUsageDescription: "Kairos uses the microphone for voice pulse check-ins and monthly review recordings."
        NSSpeechRecognitionUsageDescription: "Kairos transcribes your voice notes on-device for weekly pulse check-ins."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - kairos
            CFBundleURLName: com.damianspendel.kairos
            CFBundleTypeRole: Viewer
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.damianspendel.kairos.domain-drop
            UTTypeDescription: Kairos Domain Card
            UTTypeConformsTo:
              - public.data
          - UTTypeIdentifier: com.damianspendel.kairos.kr-drop
            UTTypeDescription: Kairos Key Result
            UTTypeConformsTo:
              - public.data
